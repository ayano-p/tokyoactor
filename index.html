<style>
/* オープニング */
 #opening-mask {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-color: #ffffff; 
    z-index: 99999;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: visibility 0.5s;
}

/* アニメーション設定 */
.shut-down {
    animation: tv-off 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
}

@keyframes tv-off {
    0% { transform: scale(1, 1); filter: brightness(1); }
    40% { transform: scale(1, 0.005); filter: brightness(10); } 
    100% { transform: scale(0, 0); filter: brightness(0); } 
}


.opening-text {
    font-size: 50px;
    font-family: 'Yu Mincho', serif;
    animation: fadeInUp 1.2s ease-out forwards;
    color: #555555;
}
@keyframes fadeInUp {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
}



body.no-scroll {
    overflow: hidden;
}

/* 全体 */
body {
    font-family: "Yu Mincho","Noto Sans JP", "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    margin: 0;
    padding: 0;
    background-color: #fcfcfc;
    width: 100%;
}

.full-width {
    width: 100%;
    box-sizing: border-box;
}

.content-wrapper {
    width: 100%;
    padding: 0 10px;
    box-sizing: border-box;
}

.flex-profile-container {
    display: flex;
    width: 100%;
    gap: 15px;
    box-sizing: border-box;
}

.flex-left-content {
    flex: 1;
    min-width: 0;
}

.flex-right-content {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.info-box {
    width: 100%;
    background: #fff;
    box-sizing: border-box;
    border-collapse: collapse;
}

.info-box td {
    padding: 10px;
    color: #786e68;
}

.profile-title-ribbon {
    background-color: #e8ddd1;
    padding: 6px 10px;
    text-align: center;
    border-radius: 10px;
    width: 70%;
    margin: 0 auto;
}

.profile-text-center {
    text-align: center;
    word-break: break-all;
    overflow-wrap: break-word;
}

/* table */
.sample {
    width: 100%;
    background: #f5f5f5;
    border-collapse: collapse;
    border-spacing: 0px;
}

.sample td {
    padding: 0px;
    font-size: 20px;
    color: #786e68;
}

.sample td > div {
    padding: 10px;
}

.sample.bg-white {
    background: #fff;
    font-size: 18px;
}




/* ボタン */
.button {
    padding: 15px 50px;
    background: linear-gradient(#1e2a44,rgb(142, 147, 168));
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 20px;
    margin: 10px 0; 
    color: white;
    border-radius: 0px;
    border: none;
    transition: 1.0s;
    cursor: pointer;
}
.button:hover {
    color: rgb(211, 211, 211);
    background: #555555;
}

#header span {
        font-family: 'Yu Mincho', serif !important;
    }

/* スマホ仕様 */
@media screen and (max-width: 900px) {
    .flex-right-content td, .flex-right-content span {
        font-size: 20px !important;
    }
    .button {
        padding: 10px 30px !important; 
        font-size: 15px !important; 
        margin: 0px 0 !important;
    }
    td img {
        width: 100% !important;
    }

 .opening-text {
        font-size: 30px !important;
    }
 
 .full-width table {
        width: 95% !important; 
    }

    .full-width table tr td {
        padding: 10px !important; 
        gap: 10px !important;
    }

    .full-width table tr td img {
        width: 50% !important;
    }

    .full-width table tr td div a.button {
        margin-left: 10px !important;
        padding: 8px 15px !important;
        font-size: 14px !important;
    }

}
</style>

<script>
window.addEventListener('DOMContentLoaded', () => {
    document.body.classList.add('no-scroll');


    setTimeout(() => {
        const mask = document.getElementById('opening-mask');
        if (mask) {
            mask.classList.add('shut-down');
            setTimeout(() => {
                mask.style.display = 'none';
                document.body.classList.remove('no-scroll');
            }, 600);
        }
    }, 1800); 
});



function movePopSlide(direction) {
  popIdx += direction;
  if (popIdx >= totalSlides) popIdx = 0;
  if (popIdx < 0) popIdx = totalSlides - 1;
  
  popupSlider.style.transform = `translateX(-${popIdx * 33.333}%)`;
}

function copyMailAddress() {
  const mail = "info.tokyoactor@gmail.com";
  navigator.clipboard.writeText(mail).then(() => {
    alert("メールアドレスをコピーしました！\n" + mail);
  }).catch(err => {
    alert("コピーに失敗しました。お手数ですが手動でコピーしてください。");
  });
}
